name: NetSentinel CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  netsentinel-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov uvicorn requests

      # ----------------------------
      # Week 5 Validation
      # ----------------------------

      - name: Verify Project Structure
        run: |
          test -f docker-compose.yml
          test -d monitoring
          test -d tests
          test -d src/analytics
          test -d src/ai
          echo "Project structure verified."

      - name: Verify Test Files
        run: |
          test -f tests/connectivity_test.py
          test -f tests/test_unit.py
          test -f tests/test_integration.py
          test -f tests/test_analysis.py
          test -f tests/test_ai.py
          echo "All test files verified."

      - name: Verify k6 Scripts
        run: |
          test -f monitoring/k6/smoke-test.js
          test -f monitoring/k6/latency-test.js
          test -f monitoring/k6/load-test.js
          echo "k6 scripts verified."

      - name: Verify Postman Collection
        run: |
          test -f "monitoring/postman/NetSentinel API Tests.postman_collection.json"
          echo "Postman collection verified."

      # ----------------------------
      # Week 6 Validation
      # ----------------------------

      - name: Start FastAPI Server
        run: |
            nohup uvicorn src.api.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
            sleep 15
            cat uvicorn.log

      - name: Verify Health Endpoint
        run: |
          curl --fail http://localhost:8000/health

      - name: Verify Metrics Endpoint
        run: |
          curl --fail http://localhost:8000/metrics

      - name: Run Unit Tests
        run: |
          pytest tests/test_unit.py -v

      - name: Run Connectivity Tests
        run: |
          pytest tests/connectivity_test.py -v

      - name: Run Integration Tests
        run: |
          pytest tests/test_integration.py -v

      # ----------------------------
      # Week 7 Validation
      # ----------------------------

      - name: Run Analytics Tests
        run: |
          pytest tests/test_analysis.py -v

      - name: Generate Analytics Charts
        run: |
          python test_chart.py

      - name: Verify Generated Charts
        run: |
          test -f monitoring/reports/charts/average_latency.png
          test -f monitoring/reports/charts/p95_latency.png
          test -f monitoring/reports/charts/total_requests.png
          test -f monitoring/reports/charts/packet_loss.png
          test -f monitoring/reports/charts/error_rate.png
          echo "All analytics charts generated successfully."

      # ----------------------------
      # Week 8 Validation
      # ----------------------------

      - name: Run AI Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pytest tests/test_ai.py -v

      - name: Generate AI Reports
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python test_report_generator.py

      - name: Verify AI Reports
        run: |
          test -f monitoring/reports/executive_summary.txt
          test -f monitoring/reports/detailed_technical_report.txt
          echo "AI reports generated successfully."

      # ----------------------------
      # Validation Complete
      # ----------------------------

      - name: NetSentinel Validation Complete
        run: |
          echo "Week 5, Week 6, Week 7 and Week 8 validation completed successfully!"